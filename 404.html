<style>
:root{--navy:#1F4E79;--navy-d:#163759;--blue:#2E75B6;--lblue:#D5E8F0;--white:#FFFFFF;--text:#1A2530;--muted:#5C6B7A;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',Arial,system-ui,sans-serif;color:var(--text);background:linear-gradient(135deg,var(--navy) 0%,var(--navy-d) 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;-webkit-font-smoothing:antialiased}
.box{max-width:600px;text-align:center;color:var(--white)}
.code{font-size:clamp(4rem,12vw,8rem);font-weight:800;letter-spacing:-.04em;line-height:1;color:var(--lblue);margin-bottom:1rem}
h1{font-size:clamp(1.5rem,3vw,2.25rem);font-weight:800;margin-bottom:1rem;letter-spacing:-.01em}
p{font-size:clamp(1rem,1.5vw,1.1rem);color:var(--lblue);margin-bottom:2rem;opacity:.95}
.actions{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
a.btn{display:inline-block;padding:.85rem 1.6rem;border-radius:var(--r);font-weight:600;text-decoration:none;transition:transform .15s,box-shadow .2s}
a.btn-pri{background:var(--white);color:var(--navy)}
a.btn-pri:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.2)}
a.btn-ghost{color:var(--white);border:1.5px solid rgba(255,255,255,.4)}
a.btn-ghost:hover{background:rgba(255,255,255,.1);border-color:var(--white)}
.tag{margin-top:3rem;font-style:italic;font-size:.9rem;color:var(--lblue);opacity:.7}
</style>
</head>
<body>
<main class="box">
  <div class="code" aria-hidden="true">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist on this site. It may have moved, or the link you followed may be out of date.</p>
  <div class="actions">
    <a href="/" class="btn btn-pri">Go to homepage</a>
    <a href="mailto:tdbutera@proton.me" class="btn btn-ghost">Email us</a>
  </div>
  <div class="tag">ButeraNet Solutions — Infrastructure. Security. Reliability.</div>
</main>
</body>
